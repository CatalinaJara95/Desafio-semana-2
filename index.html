<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">


<body class="layout">

    <header class="header">
        <h3 class="titulo-header">Mi Ecommerce</h3>
    </header>

    <aside class="sidebar">
        <h2>Categorías</h2>
        <div class="category-list">
            <div class="producto">
                <p>Perfumes</p>
                <p class="cantidad-producto"> (13) </p>
            </div>
            <div class="producto">
                <p>Ropa</p>
                <p class="cantidad-producto"> (21) </p>
            </div>
            <div class="producto">
                <p>Accesorios</p>
                <p class="cantidad-producto"> (41) </p>
            </div>
            <div class="producto">
                <p>Zapatos</p>
                <p class="cantidad-producto"> (10) </p>
            </div>
        </div>
    </aside>
    <main class="main">
        <section class="lista-productos">
            <article class="card">
                <img class="card-img" src="./assets/img/perfume-mk.png" alt="">
                <h2>Perfume myKingdom</h2>
                <p class="precio">31.400</p>
                <p class="comprar"> Comprar</p>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/perfume-phantom.png" alt="">
                <h2>Perfume Phantom</h2>
                <p class="precio">68.900</p>
                <p class="comprar"> Comprar</p>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/zapatos.png" alt="">
                <h2>Zapatos Docker</h2>
                <p class="precio">29.700</p>
                <p class="comprar"> Comprar</p>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/poleron.png" alt="">
                    <h2>Poleron Puma</h2>
                    <p class="precio">44.700</p>
                    <p class="comprar"> Comprar</p>
            </article>

        </section>
    </main>

</body>
<footer class="footer">
    <p>@miecommerce</p>
</footer>

</html>
